<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link href="{{ url_for('static', filename='png/registericon.png') }}" rel="shortcut icon">
    <title>Выбор роли</title>
    <style>

            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .wrapper {
            background: #fff;
            padding: 40px 50px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 40px;
            color: #222;
        }

        .role-buttons {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .role-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 500;
            color: #fff;
            background: #4A6CF7; /* основной синий, как в Bootstrap primary */
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            box-shadow: 0 4px 10px rgba(74, 108, 247, 0.3);
        }

        .role-btn.worker-customer {
            background: #4A6CF7;
        }

        .role-btn.owner {
            background: #6C5DD3; /* чуть более насыщенный фиолетовый для контраста */
        }

        .role-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(74, 108, 247, 0.4);
        }

        .role-btn.owner:hover {
            box-shadow: 0 6px 14px rgba(108, 93, 211, 0.4);
        }

        /* Адаптивность */
        @media (max-width: 480px) {
            .wrapper {
                padding: 30px 25px;
            }

            h2 {
                font-size: 24px;
                margin-bottom: 30px;
            }

            .role-btn {
                padding: 14px;
                font-size: 17px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2>Выберите свою роль</h2>

        <div class="role-buttons">
            <a href="{{ url_for('login') }}" class="role-btn worker-customer">
                Рабочий / Заказчик
            </a>
            <a href="{{ url_for('register') }}" class="role-btn owner">
                Владелец
            </a>
        </div>
    </div>
</body>
</html>
